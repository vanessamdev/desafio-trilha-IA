<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Contratos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Análise de Contratos com IA</h1>
        <p>Upload de documento e verificação facial (opcional)</p>
    </header>
    
    <main>
        <form id="analysis-form">
            <div class="upload-section">
                <div class="upload-box">
                    <label for="document">Documento (PDF ou Imagem) *</label>
                    <input type="file" id="document" name="document" accept=".pdf,.png,.jpg,.jpeg" required>
                    <span class="file-info" id="document-info">Nenhum arquivo selecionado</span>
                </div>
                
                <div class="upload-box">
                    <label for="face-image">Imagem Facial (opcional)</label>
                    <input type="file" id="face-image" name="face_image" accept=".png,.jpg,.jpeg">
                    <span class="file-info" id="face-info">Nenhum arquivo selecionado</span>
                </div>
            </div>
            
            <button type="submit" id="submit-btn">Analisar</button>
        </form>
        
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Processando análise...</p>
        </div>
        
        <div id="result" class="hidden">
            <h2>Resultado da Análise</h2>
            <div id="result-content"></div>
        </div>
        
        <div id="error" class="hidden">
            <h2>Erro</h2>
            <p id="error-message"></p>
        </div>
    </main>
    
    <footer>
        <p>Sistema de Análise de Contratos</p>
    </footer>
    
    <script src="js/app.js"></script>
</body>
</html>
